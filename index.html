n\t\t\tfirstShare: c[1] / n,\n\t\t\tfirstCI: wilsonCI(c[1], n),\n\t\t\ttop2Share: (c[1] + c[2]) / n,\n\t\t\tlastShare: c[3] / n,\n\t\t};\n\t}\n\tconst sums = OPTIONS.map((o) => perOption[o.id].sumRank);\n\tconst meanSum = sums.reduce((a, b) => a + b, 0) / sums.length;\n\tconst S = sums.reduce((acc, s) => acc + (s - meanSum) ** 2, 0);\n\tconst k = OPTIONS.length;\n\tconst kendallsW = (12 * S) / (n * n * (k * k * k - k));\n\tconst expected = n / k;\n\tconst chiSquare = OPTIONS.reduce(\n\t\t(acc, o) => acc + (RANK_COUNTS[o.id][1] - expected) ** 2 / expected,\n\t\t0,\n\t);\n\treturn { perOption, kendallsW, chiSquare };\n}\n\n// ====================== 작은 부품 ======================\nfunction Chip({ label }) {\n\treturn (\n\t\t<span className=\"px-3 py-1 rounded-full bg-white border border-slate-200 text-slate-700 text-xs sm:text-sm shadow-sm\">\n\t\t\t{label}\n\t\t</span>\n\t);\n}\n\nfunction Pill({ text }) {\n\treturn (\n\t\t<span className=\"px-3 py-1 rounded-full bg-white/20 backdrop-blur text-white text-xs sm:text-sm border border-white/30\">\n\t\t\t{text}\n\t\t</span>\n\t);\n}\n\nfunction Section({ title, sub, children }) {\n\treturn (\n\t\t<section className=\"mb-10 sm:mb-14\">\n\t\t\t<div className=\"mb-4 sm:mb-5\">\n\t\t\t\t<div className=\"text-[11px] font-semibold tracking-widest text-indigo-600 mb-1\">{sub}</div>\n\t\t\t\t<h2 className=\"text-xl sm:text-2xl font-bold text-slate-900\">{title}</h2>\n\t\t\t</div>\n\t\t\t{children}\n\t\t</section>\n\t);\n}\n\n// ====================== 큰 섹션 ======================\nfunction Hero() {\n\treturn (\n\t\t<header className=\"text-center mb-10 sm:mb-14\">\n\t\t\t<div className=\"inline-flex items-center gap-2 px-3 py-1 mb-4 text-[11px] font-semibold tracking-wider rounded-full bg-indigo-100 text-indigo-700\">\n\t\t\t\t<span className=\"inline-block w-2 h-2 rounded-full bg-indigo-500\"></span>\n\t\t\t\tAI쓰는한의사 단톡방 · 실명제 커뮤니티 설문\n\t\t\t</div>\n\t\t\t<h1 className=\"text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-900 mb-3 tracking-tight leading-tight\">\n\t\t\t\t'카카오채널 추가' <br className=\"sm:hidden\" />환자 UX 설문 결과\n\t\t\t</h1>\n\t\t\t<p className=\"text-slate-600 max-w-2xl mx-auto text-sm sm:text-base\">{SURVEY.question}</p>\n\t\t\t<div className=\"flex flex-wrap gap-2 justify-center mt-6\">\n\t\t\t\t<Chip label={`응답 n = ${SURVEY.n}`} />\n\t\t\t\t<Chip label={SURVEY.period} />\n\t\t\t\t<Chip label={SURVEY.audience} />\n\t\t\t\t<Chip label={`설문 진행 · ${SURVEY.surveyor}`} />\n\t\t\t</div>\n\t\t</header>\n\t);\n}\n\nfunction KeyInsight({ stats }) {\n\tconst s2 = stats.perOption[2];\n\treturn (\n\t\t<section className=\"mb-10 sm:mb-14 p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white shadow-xl\">\n\t\t\t<div className=\"text-emerald-100 text-[11px] font-semibold tracking-widest mb-2\">CORE FINDING</div>\n\t\t\t<h2 className=\"text-2xl sm:text-3xl font-bold mb-3 leading-tight\">\n\t\t\t\tQR코드 스캔(2번) — 1순위 득표율 <span className=\"text-yellow-200\">{pct(s2.firstShare, 1)}</span>로 압도적 우승\n\t\t\t</h2>\n\t\t\t<p className=\"text-emerald-50 text-sm sm:text-base leading-relaxed\">\n\t\t\t\t170명 중 142명이 QR을 1순위로 택했습니다. 95% Wilson 신뢰구간 ({pct(s2.firstCI[0], 1)} ~ {pct(s2.firstCI[1], 1)})으로도 다른 안을 압도하며, QR은 다른 두 안과의 1:1 비교에서도 모두 절대 다수로 이기는 <b>콘도르세 승자(Condorcet winner)</b>입니다.\n\t\t\t</p>\n\t\t\t<div className=\"flex flex-wrap gap-2 mt-5 text-sm\">\n\t\t\t\t<Pill text={`평균순위 ${s2.meanRank.toFixed(2)} / 3`} />\n\t\t\t\t<Pill text={`Borda ${s2.borda} (만점 ${s2.bordaMax})`} />\n\t\t\t\t<Pill text={`1·2순위 합산 ${pct(s2.top2Share, 1)}`} />\n\t\t\t</div>\n\t\t</section>\n\t);\n}\n\nfunction OptionCards({ stats }) {\n\treturn (\n\t\t<Section title=\"옵션별 1순위 득표율\" sub=\"OVERVIEW\">\n\t\t\t<div className=\"grid grid-cols-1 sm:grid-cols-3 gap-4\">\n\t\t\t\t{OPTIONS.map((o) => {\n\t\t\t\t\tconst s = stats.perOption[o.id];\n\t\t\t\t\tconst isWin = o.id === 2;\n\t\t\t\t\treturn (\n\t\t\t\t\t\t<div key={o.id} className={`p-5 rounded-2xl border-2 ${o.border} ${o.bg} relative overflow-hidden`}>\n\t\t\t\t\t\t\t{isWin && (\n\t\t\t\t\t\t\t\t<div className=\"absolute top-3 right-3 px-2 py-0.5 rounded-full bg-emerald-600 text-white text-[10px] font-bold tracking-wider\">\n\t\t\t\t\t\t\t\t\tWINNER\n\t\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t)}\n\t\t\t\t\t\t\t<div className=\"text-3xl mb-2\">{o.icon}</div>\n\t\t\t\t\t\t\t<div className={`text-[10px] font-bold tracking-widest ${o.text} mb-1`}>옵션 {o.id}</div>\n\t\t\t\t\t\t\t<div className=\"text-slate-900 font-bold text-base mb-2\">{o.label}</div>\n\t\t\t\t\t\t\t<div className=\"text-slate-600 text-xs leading-relaxed mb-3 min-h-[3.5rem]\">{o.full}</div>\n\t\t\t\t\t\t\t<div className=\"border-t border-slate-200/60 pt-3\">\n\t\t\t\t\t\t\t\t<div className={`text-3xl font-extrabold ${o.text} tabular-nums`}>{pct(s.firstShare, 1)}</div>\n\t\t\t\t\t\t\t\t<div className=\"text-slate-500 text-xs\">1순위 득표 ({s.counts[1]} / {SURVEY.n})</div>\n\t\t\t\t\t\t\t\t<div className=\"text-slate-400 text-[11px] mt-1 tabular-nums\">95% CI {pct(s.firstCI[0], 1)} ~ {pct(s.firstCI[1], 1)}</div>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t);\n\t\t\t\t})}\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction RankDistributionChart() {\n\treturn (\n\t\t<Section title=\"옵션별 순위 분포\" sub=\"RANK DISTRIBUTION\">\n\t\t\t<p className=\"text-slate-600 text-sm mb-5\">\n\t\t\t\t각 옵션을 1·2·3순위로 택한 응답자의 비율입니다. 짙은 색이 1순위, 가장 옅은 색이 3순위입니다.\n\t\t\t</p>\n\t\t\t<div className=\"space-y-5 bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm\">\n\t\t\t\t{OPTIONS.map((o) => {\n\t\t\t\t\tconst c = RANK_COUNTS[o.id];\n\t\t\t\t\tconst total = c[1] + c[2] + c[3];\n\t\t\t\t\tconst segs = [\n\t\t\t\t\t\t{ rank: 1, count: c[1], cls: o.bar, label: '1순위' },\n\t\t\t\t\t\t{ rank: 2, count: c[2], cls: `${o.bar} opacity-60`, label: '2순위' },\n\t\t\t\t\t\t{ rank: 3, count: c[3], cls: `${o.bar} opacity-25`, label: '3순위' },\n\t\t\t\t\t];\n\t\t\t\t\treturn (\n\t\t\t\t\t\t<div key={o.id}>\n\t\t\t\t\t\t\t<div className=\"flex items-center justify-between mb-2\">\n\t\t\t\t\t\t\t\t<div className=\"flex items-center gap-2\">\n\t\t\t\t\t\t\t\t\t<span className=\"text-xl\">{o.icon}</span>\n\t\t\t\t\t\t\t\t\t<span className=\"font-semibold text-slate-800 text-sm\">{o.id}. {o.label}</span>\n\t\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t\t<span className={`text-[10px] px-2 py-0.5 rounded-full ${o.badge} font-semibold tracking-wider`}>\n\t\t\t\t\t\t\t\t\t{o.id === 2 ? '최고 선호' : o.id === 1 ? '중간' : '최저 선호'}\n\t\t\t\t\t\t\t\t</span>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t<div className=\"flex w-full h-8 rounded-lg overflow-hidden border border-slate-100\">\n\t\t\t\t\t\t\t\t{segs.map((s) => (\n\t\t\t\t\t\t\t\t\t<div\n\t\t\t\t\t\t\t\t\t\tkey={s.rank}\n\t\t\t\t\t\t\t\t\t\tclassName={`${s.cls} bar-fill flex items-center justify-center text-white text-[11px] font-semibold`}\n\t\t\t\t\t\t\t\t\t\tstyle={sty({ width: `${(s.count / total) * 100}%` })}\n\t\t\t\t\t\t\t\t\t\ttitle={`${s.label} ${s.count}명`}\n\t\t\t\t\t\t\t\t\t>\n\t\t\t\t\t\t\t\t\t\t{(s.count / total) > 0.07 ? `${s.count}` : ''}\n\t\t\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t\t))}\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t<div className=\"flex gap-3 mt-1 text-[11px] text-slate-500\">\n\t\t\t\t\t\t\t\t<span>1순위 {pct(c[1] / total, 1)}</span>\n\t\t\t\t\t\t\t\t<span>2순위 {pct(c[2] / total, 1)}</span>\n\t\t\t\t\t\t\t\t<span>3순위 {pct(c[3] / total, 1)}</span>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t);\n\t\t\t\t})}\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction SummaryTable({ stats }) {\n\treturn (\n\t\t<Section title=\"핵심 지표 한눈에\" sub=\"SUMMARY METRICS\">\n\t\t\t<p className=\"text-slate-600 text-sm mb-4\">\n\t\t\t\t<b>평균순위</b>는 낮을수록 좋고(최솟값 1), <b>Borda 점수</b>는 높을수록 좋습니다(만점 {3 * SURVEY.n}).\n\t\t\t</p>\n\t\t\t<div className=\"overflow-x-auto bg-white rounded-2xl border border-slate-200 shadow-sm\">\n\t\t\t\t<table className=\"w-full text-sm\">\n\t\t\t\t\t<thead className=\"bg-slate-50 text-slate-600 text-xs uppercase tracking-wider\">\n\t\t\t\t\t\t<tr>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-left\">옵션</th>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-right\">1순위 득표율</th>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-right\">평균순위 (↓낮을수록 좋음)</th>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-right\">Borda 점수</th>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-right\">1·2순위 합산</th>\n\t\t\t\t\t\t\t<th className=\"px-4 py-3 text-right\">최하위 비율</th>\n\t\t\t\t\t\t</tr>\n\t\t\t\t\t</thead>\n\t\t\t\t\t<tbody>\n\t\t\t\t\t\t{OPTIONS.map((o) => {\n\t\t\t\t\t\t\tconst s = stats.perOption[o.id];\n\t\t\t\t\t\t\treturn (\n\t\t\t\t\t\t\t\t<tr key={o.id} className={`border-t border-slate-100 ${o.id === 2 ? 'bg-emerald-50/40' : ''}`}>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 font-semibold text-slate-800\">\n\t\t\t\t\t\t\t\t\t\t<span className=\"mr-2\">{o.icon}</span>{o.id}. {o.label}\n\t\t\t\t\t\t\t\t\t</td>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 text-right tabular-nums\">{pct(s.firstShare, 1)}</td>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 text-right tabular-nums\">{s.meanRank.toFixed(3)}</td>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 text-right tabular-nums\">{s.borda} / {s.bordaMax}</td>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 text-right tabular-nums\">{pct(s.top2Share, 1)}</td>\n\t\t\t\t\t\t\t\t\t<td className=\"px-4 py-3 text-right tabular-nums\">{pct(s.lastShare, 1)}</td>\n\t\t\t\t\t\t\t\t</tr>\n\t\t\t\t\t\t\t);\n\t\t\t\t\t\t})}\n\t\t\t\t\t</tbody>\n\t\t\t\t</table>\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction PairwiseMatrix() {\n\treturn (\n\t\t<Section title=\"1:1 페어와이즈 비교 (콘도르세)\" sub=\"PAIRWISE\">\n\t\t\t<p className=\"text-slate-600 text-sm mb-4\">\n\t\t\t\t세 옵션을 두 개씩 짝지어, 응답자별로 더 높은 순위를 매긴 옵션이 이긴 횟수입니다. <b>모든 짝에서 이기는 옵션이 콘도르세 승자</b>이며, 본 설문에서는 <b className=\"text-emerald-700\">2번 QR</b>이 명확한 콘도르세 승자입니다.\n\t\t\t</p>\n\t\t\t<div className=\"grid grid-cols-1 md:grid-cols-3 gap-4\">\n\t\t\t\t{PAIRWISE.map((p) => {\n\t\t\t\t\tconst a = OPTIONS.find((o) => o.id === p.a);\n\t\t\t\t\tconst b = OPTIONS.find((o) => o.id === p.b);\n\t\t\t\t\tconst aPct = p.aWins / (p.aWins + p.bWins);\n\t\t\t\t\treturn (\n\t\t\t\t\t\t<div key={`${p.a}-${p.b}`} className=\"bg-white rounded-2xl border border-slate-200 p-5 shadow-sm\">\n\t\t\t\t\t\t\t<div className=\"text-[11px] text-slate-500 mb-3 font-semibold tracking-wider\">{a.id}번 vs {b.id}번</div>\n\t\t\t\t\t\t\t<div className=\"flex justify-between items-baseline mb-2\">\n\t\t\t\t\t\t\t\t<span className={`${a.text} font-bold text-sm`}>{a.icon} {a.label}</span>\n\t\t\t\t\t\t\t\t<span className=\"text-2xl font-extrabold text-slate-900 tabular-nums\">{p.aWins}</span>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t<div className=\"w-full h-2 rounded-full bg-slate-100 overflow-hidden flex\">\n\t\t\t\t\t\t\t\t<div className={`${a.bar} bar-fill`} style={sty({ width: `${aPct * 100}%` })}></div>\n\t\t\t\t\t\t\t\t<div className={`${b.bar} bar-fill opacity-60`} style={sty({ width: `${(1 - aPct) * 100}%` })}></div>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t<div className=\"flex justify-between items-baseline mt-2\">\n\t\t\t\t\t\t\t\t<span className={`${b.text} font-medium text-sm`}>{b.icon} {b.label}</span>\n\t\t\t\t\t\t\t\t<span className=\"text-sm text-slate-500 tabular-nums\">{p.bWins}</span>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t\t<div className=\"text-[11px] text-slate-400 mt-3 text-right\">\n\t\t\t\t\t\t\t\t{a.id}번 우세율 <b className=\"text-slate-700\">{pct(aPct, 1)}</b>\n\t\t\t\t\t\t\t</div>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t);\n\t\t\t\t})}\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction PatternsChart() {\n\tconst max = Math.max(...PATTERNS.map((p) => p.count));\n\tconst top2 = (PATTERNS[0].count + PATTERNS[1].count) / SURVEY.n;\n\treturn (\n\t\t<Section title=\"응답 패턴 분포\" sub=\"RESPONSE PATTERNS\">\n\t\t\t<p className=\"text-slate-600 text-sm mb-4\">\n\t\t\t\t실제로 나타난 6가지 순위 패턴의 빈도입니다. 상위 두 패턴(2 &gt; 1 &gt; 3, 2 &gt; 3 &gt; 1)이 전체의 <b>{pct(top2, 1)}</b>를 차지합니다.\n\t\t\t</p>\n\t\t\t<div className=\"bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm space-y-3\">\n\t\t\t\t{PATTERNS.map((p) => (\n\t\t\t\t\t<div key={p.pattern}>\n\t\t\t\t\t\t<div className=\"flex justify-between text-sm mb-1\">\n\t\t\t\t\t\t\t<span className=\"font-mono font-semibold text-slate-700\">{p.pattern}</span>\n\t\t\t\t\t\t\t<span className=\"text-slate-500\">\n\t\t\t\t\t\t\t\t<span className=\"font-bold text-slate-800\">{p.count}명</span> · {pct(p.count / SURVEY.n, 1)}\n\t\t\t\t\t\t\t</span>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t\t<div className=\"w-full h-3 bg-slate-100 rounded-full overflow-hidden\">\n\t\t\t\t\t\t\t<div className=\"h-full bg-indigo-500 rounded-full bar-fill\" style={sty({ width: `${(p.count / max) * 100}%` })}></div>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t\t<div className=\"text-[11px] text-slate-400 mt-1\">{p.desc}</div>\n\t\t\t\t\t</div>\n\t\t\t\t))}\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction Consensus({ stats }) {\n\tconst W = stats.kendallsW;\n\tlet level = '';\n\tlet levelClr = '';\n\tif (W >= 0.7) { level = '매우 높은 합의'; levelClr = 'text-emerald-700'; }\n\telse if (W >= 0.5) { level = '뚜렷한 합의'; levelClr = 'text-emerald-600'; }\n\telse if (W >= 0.3) { level = '약한 합의'; levelClr = 'text-amber-600'; }\n\telse { level = '의견 분산'; levelClr = 'text-rose-600'; }\n\treturn (\n\t\t<Section title=\"응답자 합의 수준\" sub=\"CONSENSUS\">\n\t\t\t<div className=\"grid grid-cols-1 md:grid-cols-2 gap-4\">\n\t\t\t\t<div className=\"bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm\">\n\t\t\t\t\t<div className=\"text-[11px] font-semibold text-slate-500 tracking-wider mb-1\">KENDALL'S W (합의도)</div>\n\t\t\t\t\t<div className=\"flex items-baseline gap-3\">\n\t\t\t\t\t\t<div className=\"text-4xl font-extrabold text-slate-900 tabular-nums\">{W.toFixed(3)}</div>\n\t\t\t\t\t\t<div className={`${levelClr} font-semibold text-sm`}>{level}</div>\n\t\t\t\t\t</div>\n\t\t\t\t\t<div className=\"mt-3 w-full h-2 bg-slate-100 rounded-full overflow-hidden\">\n\t\t\t\t\t\t<div className=\"h-full bg-gradient-to-r from-rose-400 via-amber-400 to-emerald-500 rounded-full bar-fill\" style={sty({ width: `${W * 100}%` })}></div>\n\t\t\t\t\t</div>\n\t\t\t\t\t<div className=\"text-[11px] text-slate-500 mt-2 leading-relaxed\">\n\t\t\t\t\t\t170명의 순위가 얼마나 일치하는지를 0(완전 무작위)~1(완벽 일치)로 측정. 현재 0.55는 <b>응답자 간 선호 방향이 뚜렷하게 일치</b>한다는 뜻입니다.\n\t\t\t\t\t</div>\n\t\t\t\t</div>\n\t\t\t\t<div className=\"bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm\">\n\t\t\t\t\t<div className=\"text-[11px] font-semibold text-slate-500 tracking-wider mb-1\">카이제곱 검정 (1순위 분포)</div>\n\t\t\t\t\t<div className=\"flex items-baseline gap-3\">\n\t\t\t\t\t\t<div className=\"text-4xl font-extrabold text-slate-900 tabular-nums\">χ² = {stats.chiSquare.toFixed(1)}</div>\n\t\t\t\t\t\t<div className=\"text-rose-600 font-semibold text-sm\">p &lt; 0.001</div>\n\t\t\t\t\t</div>\n\t\t\t\t\t<div className=\"text-[11px] text-slate-500 mt-2 leading-relaxed\">\n\t\t\t\t\t\t\"1순위 선택이 세 옵션에 균등하게 분포한다\"는 귀무가설을 검정. df=2일 때 이 값은 <b>극히 강하게 기각</b>되며, QR 편향이 우연이 아님을 뜻합니다.\n\t\t\t\t\t</div>\n\t\t\t\t</div>\n\t\t\t</div>\n\t\t</Section>\n\t);\n}\n\nfunction Comments() {\n\treturn (\n\t\t<Section title=\"주목할 만한 의견\" sub=\"NOTABLE VOICES\">\n\t\t\t<p className=\"text-slate-600 text-sm mb-4\">숫자만으로는 보이지 않는, 임상 현장의 맥락 있는 의견들입니다.</p>\n\t\t\t<div className=\"grid grid-cols-1 md:grid-cols-2 gap-4\">\n\t\t\t\t{NOTABLE.map((c) => (\n\t\t\t\t\t<div key={c.user} className=\"bg-white rounded-2xl border border-slate-200 p-5 shadow-sm\">\n\t\t\t\t\t\t<div className=\"flex items-center justify-between mb-2 gap-2\">\n\t\t\t\t\t\t\t<span className=\"font-bold text-slate-800 text-sm\">{c.user}</span>\n\t\t\t\t\t\t\t<span className=\"text-[10px] font-semibold tracking-wider text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-full whitespace-nowrap\">\n\t\t\t\t\t\t\t\t{c.angle}\n\t\t\t\t\t\t\t</span>\n\t\t\t\t\t\t</div>\n\t\t\t\t\t\t<div className=\"text-[11px] text-slate-500 mb-2 font-mono\">{c.rank}</div>\n\t\t\t\t\t\t<p className=\"text-slate-700 text-sm leading-relaxed quote-mark\">{c.text}</p>\n\t\t\t\t\t<
